{% extends 'base.html' %}

{% block content %}

<div class="container mt-5 pt-5">
  <div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 150px);">
    <div class="col-md-5">
      <div class="card shadow-lg border-0 rounded-4 text-center">
        <div class="card-body p-4">

          <h3 class="fw-bold mb-3" style="color:#19416d;">
            📧 Check Your Email
          </h3>

          <p class="text-muted mb-4">
            We’ve sent you instructions to reset your password.<br>
            Please check your inbox (and spam folder).
          </p>

          <a href="{% url 'login_view' %}" class="btn btn-primary w-100">
            Back to Login
          </a>

        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .card {
    border-radius: 1rem;
  }

  .btn-primary {
    border-radius: 0.5rem;
    font-weight: 500;
  }

  .text-muted {
    font-size: 0.9rem;
  }
</style>

{% endblock %}
