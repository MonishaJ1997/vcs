 
{% extends 'base.html' %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">

    <h2 class="auth-title">Register</h2>

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label>Name <span class="required">*</span></label>
        {{ form.username }}
        <small class="error">{{ form.username.errors }}</small>
      </div>

      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        {{ form.email }}
        <small class="error">{{ form.email.errors }}</small>
      </div>

      <div class="form-group">
        <label>Password <span class="required">*</span></label>
        {{ form.password }}
     
        <small class="error">{{ form.password.errors }}</small>
      </div>

      <button type="submit" class="btn-primary">
        Register
      </button>

    </form>
<p class="auth-link">
      Already have an account?
      <a href="{% url 'login' %}">Login</a>
    </p>
  </div>
</section>

<!-- ✅ Success Popup -->
{% if messages %}
<script>
  {% for message in messages %}
    alert("{{ message }}");
  {% endfor %}
</script>
{% endif %}

<style>


/* (keep your previous styles) */
.hint {
  display: block;
  color: #6c757d;
  font-size: 12px;
  margin-top: 4px;
}

.error {
  display: block;
  color: #d63031;
  font-size: 13px;
  margin-top: 4px;
}

.auth-section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  
}

.auth-card {
  width: 100%;
  max-width: 400px;
  padding: 30px;
  border-radius: 16px;
  background: #dad9d9;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  margin-top: 100px;
}

.auth-title {
  text-align: center;
  margin-bottom: 20px;
}

/* Form */
.form-group {
  margin-bottom: 15px;
}

label {
  font-size: 14px;
  font-weight: 500;
}

.required {
  color: red;
}

/* Inputs */
input {
  width: 100%;
  height: 45px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 5px;
}

input:focus {
  border-color: #28a745;
}

/* Button */
.btn-primary {
  width: 100%;
  height: 45px;
  border: none;
  border-radius: 10px;
  background: #28a745;
  color: white;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}

.btn-primary:hover {
  background: #218838;
}
.auth-link {
  text-align: center;
  margin-top: 10px;
  
}
.auth-link a{
  text-decoration: none !important;
}
.auth-link a:hover{
  text-decoration: underline !important;
}
</style>
{% endblock %}
