{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

<section class="login-section">
  <div class="login-card">

    <h3 class="login-title">Welcome Back</h3>
    <p class="login-subtitle">Login to your account</p>

    <!-- Messages -->
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger text-center">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      {{ form|crispy }}

      <button type="submit" class="btn-login">
        Login
      </button>
    </form>

    <div class="login-links">
      <p>
        Don’t have an account?
        <a href="{% url 'register' %}">Sign up</a>
      </p>

      
    </div>

  </div>
</section>

<style>

/* Background */
.login-section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
 
 
}

/* Card */
.login-card {
  width: 100%;
  max-width: 380px;
  padding: 35px 30px;
  border-radius: 20px;
  background: #ffffff;
  box-shadow: 0 15px 40px rgba(0,0,0,0.1);
  animation: fadeIn 0.6s ease;
  margin-top: 150px;
}

/* Title */
.login-title {
  text-align: center;
  font-weight: 700;
  margin-bottom: 5px;
}

.login-subtitle {
  text-align: center;
  font-size: 14px;
  color: #6c757d;
  margin-bottom: 20px;
}

/* Required star */
.asteriskField {
  color: red !important;
}

/* Inputs */
input.form-control {
  border-radius: 12px;
  height: 45px;
  border: 1px solid #ddd;
  transition: 0.3s;
  margin-top: 10px;
}



/* Button */
.btn-login {
  width: 100%;
  height: 45px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background:  #28a745;
  color: white;
  font-weight: 600;
  transition: 0.3s;
}


.btn-login:hover {
  background: #218838;
}

/* Links */
.login-links {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
}

.login-links a {
 
  text-decoration: none;
  font-weight: 500;
}

.login-links a:hover {
  text-decoration: underline;
}

.forgot {
  display: block;
  margin-top: 5px;
}

/* Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(25px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
/* space between label and input */
.form-group label,
label {
  display: block;
  margin-bottom: 6px;  /* 👈 gap added */
}

/* space between input fields */
.form-group {
  margin-bottom: 15px;
}
</style>

{% endblock %}
